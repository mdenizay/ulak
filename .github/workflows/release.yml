name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Job 1: Build binaries and .deb packages for amd64 and arm64
  # ──────────────────────────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goarch: [amd64, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build binary
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          mkdir -p dist
          go build \
            -ldflags "-s -w -X github.com/mdenizay/ulak/cmd.Version=${VERSION}" \
            -o dist/ulak-linux-${{ matrix.goarch }} \
            ./main.go

      - name: Generate shell completions (amd64 only)
        if: matrix.goarch == 'amd64'
        run: |
          mkdir -p completions
          ./dist/ulak-linux-amd64 completion bash > completions/ulak.bash
          ./dist/ulak-linux-amd64 completion zsh  > completions/ulak.zsh
          ./dist/ulak-linux-amd64 completion fish > completions/ulak.fish

      - name: Create empty completions (arm64 — completions are arch-independent)
        if: matrix.goarch == 'arm64'
        run: mkdir -p completions

      - name: Install nfpm
        run: |
          curl -sSfL \
            https://github.com/goreleaser/nfpm/releases/download/v2.37.1/nfpm_2.37.1_Linux_x86_64.tar.gz \
            | tar -xz -C /usr/local/bin nfpm

      - name: Package .deb
        env:
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          nfpm package \
            --config nfpm.yaml \
            --packager deb \
            --target dist/ulak_${VERSION}_${{ matrix.goarch }}.deb

      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-${{ matrix.goarch }}
          path: dist/ulak_*.deb
          retention-days: 1

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.goarch }}
          path: dist/ulak-linux-${{ matrix.goarch }}
          retention-days: 1

      - name: Upload completions artifact (amd64 only)
        if: matrix.goarch == 'amd64'
        uses: actions/upload-artifact@v4
        with:
          name: completions
          path: completions/
          retention-days: 1

  # ──────────────────────────────────────────────────────────────────────────
  # Job 2: Create GitHub Release and update apt repo on gh-pages
  # ──────────────────────────────────────────────────────────────────────────
  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts into dist/
        run: |
          mkdir -p dist completions
          find artifacts/deb-*     -type f -name '*.deb' -exec mv {} dist/ \;
          find artifacts/binary-*  -type f               -exec mv {} dist/ \;
          find artifacts/completions -type f              -exec mv {} completions/ \; 2>/dev/null || true
          ls -lh dist/

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # ── GitHub Release ────────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/ulak_*.deb
            dist/ulak-linux-amd64
            dist/ulak-linux-arm64

      # ── GPG Setup ─────────────────────────────────────────────────────────
      - name: Import GPG signing key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo "$GPG_PRIVATE_KEY" | base64 -d | gpg --batch --import
          KEY_ID=$(gpg --list-secret-keys --with-colons | awk -F: '/^sec/{print $5}' | head -1)
          echo "KEY_ID=${KEY_ID}" >> "$GITHUB_ENV"
          # Pre-cache passphrase
          echo "$GPG_PASSPHRASE" | gpg --batch --yes \
            --pinentry-mode loopback --passphrase-fd 0 \
            --armor --output /dev/null --sign /dev/null 2>/dev/null || true

      # ── Checkout gh-pages ─────────────────────────────────────────────────
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      # ── Build apt repository ──────────────────────────────────────────────
      - name: Set up apt repo structure
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          mkdir -p gh-pages/dists/stable/main/binary-amd64
          mkdir -p gh-pages/dists/stable/main/binary-arm64
          mkdir -p gh-pages/pool/main/u/ulak

          cp dist/ulak_${VERSION}_amd64.deb gh-pages/pool/main/u/ulak/
          cp dist/ulak_${VERSION}_arm64.deb gh-pages/pool/main/u/ulak/

      - name: Generate Packages index files
        run: |
          cd gh-pages
          for ARCH in amd64 arm64; do
            apt-ftparchive \
              --arch "${ARCH}" \
              packages pool/main/u/ulak \
              > dists/stable/main/binary-${ARCH}/Packages

            gzip  -9 -k dists/stable/main/binary-${ARCH}/Packages
            bzip2    -k dists/stable/main/binary-${ARCH}/Packages
          done

      - name: Generate Release file
        run: |
          cd gh-pages
          apt-ftparchive \
            -o APT::FTPArchive::Release::Origin="Ulak" \
            -o APT::FTPArchive::Release::Label="Ulak" \
            -o APT::FTPArchive::Release::Suite="stable" \
            -o APT::FTPArchive::Release::Codename="stable" \
            -o APT::FTPArchive::Release::Architectures="amd64 arm64" \
            -o APT::FTPArchive::Release::Components="main" \
            -o APT::FTPArchive::Release::Description="Ulak apt repository" \
            release dists/stable \
            > dists/stable/Release

      - name: GPG sign Release
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          cd gh-pages

          echo "$GPG_PASSPHRASE" | gpg --batch --yes \
            --pinentry-mode loopback --passphrase-fd 0 \
            --default-key "$KEY_ID" \
            --armor --detach-sign \
            --output dists/stable/Release.gpg \
            dists/stable/Release

          echo "$GPG_PASSPHRASE" | gpg --batch --yes \
            --pinentry-mode loopback --passphrase-fd 0 \
            --default-key "$KEY_ID" \
            --armor --clearsign \
            --output dists/stable/InRelease \
            dists/stable/Release

      - name: Export GPG public key to gh-pages
        run: |
          gpg --armor --export "$KEY_ID" > gh-pages/ulak-archive-keyring.gpg

      - name: Commit and push gh-pages
        run: |
          cd gh-pages
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit --allow-empty \
            -m "apt repo: release v${{ steps.version.outputs.VERSION }}"
          git push origin gh-pages
